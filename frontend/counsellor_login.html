<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Counsellor Login — MindCare</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/common.js" defer></script>
  <script src="assets/counsellor_login.js" defer></script>
</head>
<body data-theme="dark">
  <div class="topbar container">
    <div class="brand">
      <div class="logo">MC</div>
      <div class="brand-text">Counsellor Login</div>
    </div>
    <div>
      <button id="themeToggle" class="btn icon-btn">🌓</button>
    </div>
  </div>

  <main class="container">
    <section class="panel form-panel animate-panel">
      <label>Username</label>
      <input id="cname" placeholder="e.g. ise_manoj" />
      <label>Password</label>
      <input id="cpass" type="password" />
      <div class="actions">
        <button id="btnCounsellorLogin" class="btn">Login</button>
      </div>
    </section>
  </main>
</body>
</html>
